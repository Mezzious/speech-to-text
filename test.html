<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech To Text</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:white;
      width:400px;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#0f172a;
    }

    textarea{
      width:100%;
      height:180px;
      padding:15px;
      border-radius:12px;
      border:2px solid #ccc;
      resize:none;
      font-size:16px;
      box-sizing:border-box;
    }

    .btn-group{
      display:flex;
      gap:10px;
      margin-top:20px;
    }

    button{
      flex:1;
      padding:12px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      color:white;
    }

    #start{
      background:#22c55e;
    }

    #stop{
      background:#ef4444;
    }

    .status{
      margin-top:15px;
      text-align:center;
      color:#555;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Speech To Text</h2>

    <textarea id="text" placeholder="Hasil suara muncul di sini..."></textarea>

    <div class="btn-group">
      <button id="start">Start</button>
      <button id="stop">Stop</button>
    </div>

    <div class="status" id="status">
      Status: Idle
    </div>
  </div>

  <script>
    const textArea = document.getElementById("text");
    const status = document.getElementById("status");
    const startBtn = document.getElementById("start");
    const stopBtn = document.getElementById("stop");

    // cek support browser
    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("Browser tidak mendukung Speech Recognition.\nGunakan Google Chrome atau Microsoft Edge.");
    } else {

      const recognition = new SpeechRecognition();

      recognition.lang = "id-ID";
      recognition.continuous = true;
      recognition.interimResults = true;

      let finalTranscript = "";

      startBtn.onclick = () => {
        finalTranscript = "";
        recognition.start();
        status.innerHTML = "Status: Mendengarkan...";
      };

      stopBtn.onclick = () => {
        recognition.stop();
        status.innerHTML = "Status: Berhenti";
      };

      recognition.onresult = (event) => {

        let interimTranscript = "";

        for(let i = event.resultIndex; i < event.results.length; i++){

          let transcript = event.results[i][0].transcript;

          if(event.results[i].isFinal){
            finalTranscript += transcript + " ";
          } else {
            interimTranscript += transcript;
          }
        }

        textArea.value = finalTranscript + interimTranscript;
      };

      recognition.onerror = (event) => {
        status.innerHTML = "Error: " + event.error;
      };

      recognition.onstart = () => {
        status.innerHTML = "Status: Microphone aktif";
      };

      recognition.onend = () => {
        status.innerHTML = "Status: Selesai";
      };
    }
  </script>

</body>
</html>
